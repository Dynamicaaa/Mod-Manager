name: Nightly Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # set a date or timestamp, fallback to pushed_at
  today: ${{ github.event.head_commit.timestamp || github.event.pushed_at }}
  nightly_tag: nightly-${{ github.run_number }}

jobs:
  build:
    name: Build on all platforms
    # define a matrix to run on ubuntu, macos, and windows
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        # pull the code so each runner can build

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        # install bun on each runner (works on all three OSes)

      - name: Cache Bun dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-
        # cache bun’s cache folder and node_modules for faster installs

      - name: Install dependencies
        run: bun install
        # install js/ts dependencies from bun.lockb

      - name: Postinstall rebuild
        run: bun run postinstall
        # run any postinstall steps (e.g., native rebuilds)

      - name: Build for ${{ matrix.os }}
        run: |
          # choose the right dist command per OS
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # on windows, you might need to use a .cmd or adjust shell
            bun run dist:win
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            bun run dist:mac
          else
            bun run dist:linux
          fi
        shell: bash
        # this block picks the correct dist command per OS
        # dist:mac will run electron-builder --mac on a mac runner
        # dist:windows should run electron-builder --win on a windows runner
        # dist:linux should run electron-builder --linux on ubuntu runner

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ddmm-${{ matrix.os }}-artifacts
          path: dist/
        # after building on each OS, upload those artifacts separately

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install git-cliff
        run: |
          curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.8.0/git-cliff-2.8.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-2.8.0/git-cliff /usr/local/bin/
        # grab git-cliff binary for changelog generation

      - name: Generate changelog
        run: git-cliff -t nightly-${{ github.run_number }} > CHANGELOG.md
        # produce a changelog tagged with the nightly tag

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md

  nightly-branch:
    name: Update nightly branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create/update nightly branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin
          git branch -f nightly HEAD
          git push -f origin nightly
        # force-update the nightly branch to point at main’s latest commit

  release:
    name: Publish Nightly Release
    needs: [build, changelog, nightly-branch]
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        # get all OS artifacts and changelog

      - name: Copy changelog
        run: cp artifacts/changelog/CHANGELOG.md ./CHANGELOG.md

      - name: Create Nightly Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: Nightly Build (${{ github.run_number }})
          prerelease: true
          body_path: CHANGELOG.md
          files: |
            artifacts/**/*.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # publish a GitHub Release, attaching all built artifacts from each OS
